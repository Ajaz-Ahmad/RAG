name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space (history-free)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          # Git identity required to make commits in CI
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          # Orphan branch = single commit, no history, no old binary files
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "Deploy to HuggingFace Space"

          git push https://ajaz1202:${HF_TOKEN}@huggingface.co/spaces/ajaz1202/wikipedia-rag-api hf-deploy:main --force
