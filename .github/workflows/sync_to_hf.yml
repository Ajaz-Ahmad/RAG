name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space (history-free)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Create a fresh orphan branch containing only the current files.
          # This strips all git history (including the old data/index.faiss binary)
          # so HuggingFace's binary-file check never sees it.
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "Deploy to HuggingFace Space"
          git push https://ajaz1202:${HF_TOKEN}@huggingface.co/spaces/ajaz1202/wikipedia-rag-api hf-deploy:main --force
